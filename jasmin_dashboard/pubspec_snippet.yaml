# Add these parts to your JASMIN Dashboard Flutter pubspec.yaml

flutter:
  assets:
    - assets/images/jasmin_logo_icon_opaque.png
    - assets/images/jasmin_logo_full.png

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/jasmin_logo_icon_opaque.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/jasmin_logo_icon_opaque.png"
