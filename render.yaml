services:
  - type: web
    name: jasmintopup
    runtime: node
    region: singapore   # closest to Cambodia
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: ADMIN_JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false          # set to your Render URL after first deploy
      - key: PAYMENT_SIMULATION_MODE
        value: "true"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: KHPAY_BASE_URL
        value: "https://khpay.site/api/v1"
      - key: KHPAY_API_KEY
        sync: false
      - key: KHPAY_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
